openapi: 3.1.0
info:
  title: llama.cpp server upstream contract for llama.cpp-stack
  version: b8840
  description: >
    Reviewed upstream contract for the pinned llama.cpp server snapshot used by
    llama.cpp-stack. This is not an official llama.cpp OpenAPI document. It is
    derived from the vendored llama.cpp b8840 server docs/source and covers the
    upstream endpoints consumed by the gateway.
x-llamacpp-stack:
  source_repo: https://github.com/ggml-org/llama.cpp
  git_tag: b8840
  git_commit: 9e5647affa54ea724196db15ec9b76c4abd16d4a
  images:
    cpu: ghcr.io/ggml-org/llama.cpp:server-b8840
    vulkan: ghcr.io/ggml-org/llama.cpp:server-vulkan-b8840
    cuda: ghcr.io/ggml-org/llama.cpp:server-cuda-b8840
paths:
  /health:
    get:
      operationId: llamaHealth
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                type: object
  /models:
    get:
      operationId: llamaListModels
      responses:
        '200':
          description: Router model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
  /v1/models:
    get:
      operationId: llamaListModelsV1
      responses:
        '200':
          description: Router model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
  /models/load:
    post:
      operationId: llamaLoadModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: Load result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
  /models/unload:
    post:
      operationId: llamaUnloadModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: Unload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
  /v1/chat/completions:
    post:
      operationId: llamaCreateChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: llama.cpp OpenAI-compatible chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletion'
            text/event-stream:
              schema:
                type: string
  /v1/completions:
    post:
      operationId: llamaCreateCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: llama.cpp OpenAI-compatible completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Completion'
            text/event-stream:
              schema:
                type: string
  /v1/responses:
    post:
      operationId: llamaCreateResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: llama.cpp OpenAI-compatible Responses response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
            text/event-stream:
              schema:
                type: string
  /v1/embeddings:
    post:
      operationId: llamaCreateEmbedding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: llama.cpp OpenAI-compatible embeddings response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
components:
  schemas:
    ModelRequest:
      type: object
      required: [model]
      additionalProperties: true
      properties:
        model:
          type: string
    Success:
      type: object
      required: [success]
      additionalProperties: true
      properties:
        success:
          type: boolean
    ModelList:
      type: object
      required: [object, data]
      additionalProperties: true
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelRecord'
    ModelRecord:
      type: object
      required: [id, object, owned_by, status]
      additionalProperties: true
      properties:
        id:
          type: string
        object:
          type: string
        owned_by:
          type: string
        aliases:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        created:
          type: integer
        status:
          type: object
          additionalProperties: true
          required: [value, args]
          properties:
            value:
              type: string
            args:
              type: array
              items:
                type: string
            preset:
              type: string
            exit_code:
              type: integer
            failed:
              type: boolean
    CompletionUsage:
      type: object
      required: [completion_tokens, prompt_tokens, total_tokens, prompt_tokens_details]
      additionalProperties: true
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        prompt_tokens_details:
          type: object
          required: [cached_tokens]
          additionalProperties: true
          properties:
            cached_tokens:
              type: integer
    ResponseUsage:
      type: object
      required: [input_tokens, output_tokens, total_tokens, input_tokens_details]
      additionalProperties: true
      properties:
        input_tokens:
          type: integer
        input_tokens_details:
          type: object
          required: [cached_tokens]
          additionalProperties: true
          properties:
            cached_tokens:
              type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
    ChatCompletion:
      type: object
      additionalProperties: true
      properties:
        usage:
          $ref: '#/components/schemas/CompletionUsage'
    Completion:
      type: object
      additionalProperties: true
      properties:
        usage:
          $ref: '#/components/schemas/CompletionUsage'
    Response:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        object:
          type: string
          enum: [response]
        status:
          type: string
        model:
          type: string
        output:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputItem'
        usage:
          $ref: '#/components/schemas/ResponseUsage'
    ResponseCompletedEvent:
      type: object
      required: [type, response]
      properties:
        type:
          type: string
          enum: [response.completed]
        response:
          $ref: '#/components/schemas/Response'
        sequence_number:
          type: integer
    ResponseFunctionCallArgumentsDeltaEvent:
      type: object
      required: [type, item_id, delta]
      properties:
        type:
          type: string
          enum: [response.function_call_arguments.delta]
        item_id:
          type: string
        output_index:
          type: integer
        sequence_number:
          type: integer
        delta:
          type: string
    ResponseOutputItemDoneEvent:
      type: object
      required: [type, item]
      properties:
        type:
          type: string
          enum: [response.output_item.done]
        output_index:
          type: integer
        sequence_number:
          type: integer
        item:
          $ref: '#/components/schemas/ResponseOutputItem'
    ResponseOutputItem:
      oneOf:
        - $ref: '#/components/schemas/ResponseOutputFunctionCallItem'
        - $ref: '#/components/schemas/ResponseOutputMessageItem'
        - $ref: '#/components/schemas/ResponseOutputReasoningItem'
    ResponseOutputFunctionCallItem:
      type: object
      required: [type, call_id, name, arguments]
      properties:
        type:
          type: string
          enum: [function_call]
        id:
          type: string
        call_id:
          type: string
        name:
          type: string
        arguments:
          type: string
        status:
          type: string
          enum: [in_progress, completed, incomplete]
    ResponseOutputMessageItem:
      type: object
      required: [type, id, role, content]
      properties:
        type:
          type: string
          enum: [message]
        id:
          type: string
        role:
          type: string
          enum: [assistant]
        status:
          type: string
          enum: [in_progress, completed, incomplete]
        content:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputMessageContent'
    ResponseOutputMessageContent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [output_text, refusal]
        text:
          type: string
        refusal:
          type: string
    ResponseOutputReasoningItem:
      type: object
      required: [type, id, summary]
      properties:
        type:
          type: string
          enum: [reasoning]
        id:
          type: string
        summary:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputSummaryTextContent'
        content:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputReasoningContent'
        encrypted_content:
          type: string
        status:
          type: string
          enum: [in_progress, completed, incomplete]
    ResponseOutputReasoningContent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [reasoning_text]
        text:
          type: string
    ResponseOutputSummaryTextContent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [summary_text]
        text:
          type: string
    EmbeddingUsage:
      type: object
      additionalProperties: true
      properties:
        prompt_tokens:
          type: integer
        total_tokens:
          type: integer
    EmbeddingResponse:
      type: object
      additionalProperties: true
      properties:
        usage:
          $ref: '#/components/schemas/EmbeddingUsage'
