services:
  llama-server:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-vulkan}
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8080}:${LLAMA_PORT:-8080}"
    volumes:
      - ./models:/models:ro
      - hf-cache:/root/.cache/huggingface
    devices:
      # AMD/Intel render nodes used by Mesa/Vulkan.
      - /dev/dri:/dev/dri
    group_add:
      # Common Linux render/video group ids vary by distro.
      - "44"
      - "107"
      - "109"
      - "992"
    ipc: host
    security_opt:
      - no-new-privileges:true
    environment:
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: ${LLAMA_PORT:-8080}
      LLAMA_ARG_MODEL: ${LLAMA_MODEL:-/models/model.gguf}
      LLAMA_ARG_ALIAS: ${LLAMA_ALIAS:-local-llm}
      LLAMA_ARG_CTX_SIZE: ${LLAMA_CTX_SIZE:-8192}
      LLAMA_ARG_N_PARALLEL: ${LLAMA_N_PARALLEL:-2}
      LLAMA_ARG_THREADS_HTTP: ${LLAMA_THREADS_HTTP:--1}
      LLAMA_ARG_N_GPU_LAYERS: ${LLAMA_N_GPU_LAYERS:-999}
      LLAMA_ARG_CONT_BATCHING: "true"
      LLAMA_ARG_CACHE_PROMPT: "true"
      LLAMA_ARG_ENDPOINT_METRICS: ${LLAMA_METRICS:-1}
      LLAMA_ARG_ENDPOINT_SLOTS: ${LLAMA_SLOTS:-1}
      LLAMA_API_KEY: ${LLAMA_API_KEY:-}
      # Vulkan loader visibility/debugging. Uncomment in an override file if needed.
      # VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/radeon_icd.x86_64.json
      # VK_LOADER_DEBUG: error,warn
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${LLAMA_PORT:-8080}/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    stop_grace_period: 30s

volumes:
  hf-cache:
