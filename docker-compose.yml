services:
  llama:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: llama-cpp
    restart: unless-stopped
    ports:
      - "${LLAMA_HOST:-127.0.0.1}:${LLAMA_PORT:-8080}:8080"
    volumes:
      - ./models:/models:ro,Z
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512m,mode=1777
    ipc: host
    # The official server image already has llama-server as its ENTRYPOINT.
    # Keep this as args only; overriding entrypoint can miss /app/llama-server.
    command: >-
      --host 0.0.0.0
      --port 8080
      --model /models/${LLAMA_MODEL_FILE:-model.gguf}
      --alias ${LLAMA_ALIAS:-local-llm}
      --ctx-size ${LLAMA_CTX_SIZE:-8192}
      --parallel ${LLAMA_N_PARALLEL:-2}
      --threads-http ${LLAMA_THREADS_HTTP:--1}
      --n-gpu-layers ${LLAMA_N_GPU_LAYERS:-999}
      --cont-batching
      --cache-prompt
      ${LLAMA_EXTRA_ARGS:-}
    healthcheck:
      test:
        - CMD-SHELL
        - bash -lc '</dev/tcp/127.0.0.1/8080'
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
    stop_grace_period: 30s
