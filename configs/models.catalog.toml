# --- New-architecture compatibility candidates ---
# Keep a small representative set for backend compatibility testing.

# Liquid LFM2 is a newer hybrid architecture; validate pinned llama.cpp support.
[[models]]
repo = "LiquidAI/LFM2-700M-GGUF"
quant = "Q4_K_M"
file = "LFM2-700M-Q4_K_M.gguf"

[[models]]
repo = "unsloth/Qwen3.5-9B-GGUF"
quant = "Q4_K_M"
mmproj = "mmproj-F16.gguf"


# --- MoE models ---
# 8GB UMA candidates: OLMoE is 1B active / 7B total. Start with Q3_K_M;
# Q4_K_M is a quality step-up if memory pressure is acceptable.

[[models]]
repo = "allenai/OLMoE-1B-7B-0125-GGUF"
quant = "Q3_K_M"
file = "OLMoE-1B-7B-0125-Q3_K_M.gguf"

[[models]]
repo = "allenai/OLMoE-1B-7B-0125-GGUF"
quant = "Q4_K_M"
file = "OLMoE-1B-7B-0125-Q4_K_M.gguf"

# Large UMA candidates: larger Qwen MoE models. These are useful for testing
