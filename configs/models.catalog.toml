# Hugging Face model source catalog.
# Keep this source-only: runtime params, aliases, ports, and routing live elsewhere.
# Model id is derived as: <repo>/<quant>
# Stable local path is: models/hf/<repo>/<quant>.gguf

# --- Smoke-test model ---

[[models]]
repo = "ggml-org/Qwen3-0.6B-GGUF"
quant = "Q8_0"

# --- Small chat models ---

[[models]]
repo = "ggml-org/Qwen3-1.7B-GGUF"
quant = "Q4_K_M"

# Qwen3.5 may require a newer llama.cpp than the pinned image; validate before production use.
[[models]]
repo = "unsloth/Qwen3.5-2B-GGUF"
quant = "Q4_K_M"
mmproj = "mmproj-F16.gguf"

[[models]]
repo = "unsloth/Qwen3.5-4B-GGUF"
