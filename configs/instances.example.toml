# Multi-instance llama-server config.
# Copy to configs/instances.toml and edit for your host/models.

[defaults]
backend = "vulkan"              # cpu, vulkan, cuda
host = "127.0.0.1"
ctx_size = 8192
parallel = 1
threads_http = -1
n_gpu_layers = 999
extra_args = ""

[[instances]]
name = "qwen3-4b"
enabled = true
port = 8081
model_file = "Qwen3-4B-Q4_K_M.gguf"
alias = "qwen3-4b-local"
parallel = 2

[[instances]]
name = "coder-7b"
enabled = false
port = 8082
model_file = "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
alias = "qwen2.5-coder-7b-local"
