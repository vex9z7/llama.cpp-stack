name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and config checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check formatting basics
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import sys

          allowed_suffixes = {".env", ".example", ".gitignore", ".md", ".yml", ".yaml"}
          allowed_names = {"Makefile"}
          skip_dirs = {".git", "models"}
          failures = []

          for path in sorted(Path(".").rglob("*")):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              if path.name not in allowed_names and path.suffix not in allowed_suffixes:
                  continue
              data = path.read_bytes()
              rel = path.as_posix()
              if data and not data.endswith(b"\n"):
                  failures.append(f"{rel}: missing trailing newline")
              for lineno, line in enumerate(data.splitlines(), start=1):
                  if line.rstrip(b" \t") != line:
                      failures.append(f"{rel}:{lineno}: trailing whitespace")

          if failures:
              print("\n".join(failures))
              sys.exit(1)
          PY

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate Makefile defaults
        shell: bash
        run: |
          set -euo pipefail
          cp .env.example .env
          touch models/model.gguf
          make check BACKEND=cpu LLAMA_MODEL= LLAMA_MODEL_FILE=model.gguf
          make models >/dev/null
          make schemas
          make go-test
          test -z "$(gofmt -l cmd internal)"
          python3 -m py_compile scripts/probe_api_schemas.py scripts/probe_gateway.py scripts/render_instances.py
          python3 scripts/render_instances.py render --config configs/instances.example.toml --output /tmp/llama-instances.yml
          make -n up BACKEND=cpu LLAMA_MODEL= LLAMA_MODEL_FILE=model.gguf >/dev/null
          make -n dynamic-up BACKEND=cpu >/dev/null

      - name: Validate Compose configs
        shell: bash
        run: |
          set -euo pipefail
          LLAMA_MODEL_FILE=model.gguf docker compose -f docker-compose.yml config >/tmp/compose.cpu.yml
          LLAMA_MODEL_FILE=model.gguf docker compose -f docker-compose.yml -f docker-compose.vulkan.yml config >/tmp/compose.vulkan.yml
          LLAMA_MODEL_FILE=model.gguf docker compose -f docker-compose.yml -f docker-compose.cuda.yml config >/tmp/compose.cuda.yml
          docker compose -f docker-compose.dynamic.yml config >/tmp/compose.dynamic.cpu.yml
          docker compose -f docker-compose.dynamic.yml -f docker-compose.dynamic.vulkan.yml config >/tmp/compose.dynamic.vulkan.yml
          docker compose -f docker-compose.dynamic.yml -f docker-compose.dynamic.cuda.yml config >/tmp/compose.dynamic.cuda.yml
