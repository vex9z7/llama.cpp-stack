x-worker-env: &worker-env
  WORKER_AGENT_ADDR: :8092
  LLAMA_SERVER_ADDR: :8080
  LLAMA_SERVER_BIN: ${LLAMA_SERVER_BIN:-/app/llama-server}
  MODELS_DIR: /models
  LLAMA_INSTANCE_START_TIMEOUT_SECONDS: ${LLAMA_INSTANCE_START_TIMEOUT_SECONDS:-120}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-json}

x-worker-common: &worker-common
  build:
    context: .
    dockerfile: Dockerfile.worker
    args:
      LLAMA_WORKER_BASE_IMAGE: ${LLAMA_WORKER_BASE_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
  restart: unless-stopped
  volumes:
    - ./models:/models:ro,z
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=512m,mode=1777
  ipc: host
  expose:
    - "8080"
    - "8092"
  environment:
    <<: *worker-env
  healthcheck:
    test:
      - CMD-SHELL
      - bash -lc '</dev/tcp/127.0.0.1/8092'
    interval: 30s
    timeout: 5s
    retries: 10
    start_period: 10s
  stop_grace_period: 30s

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: llama-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_HOST:-127.0.0.1}:${GATEWAY_PORT:-8080}:8090"
    volumes:
      - ./models:/models:rw,z
    security_opt:
      - no-new-privileges:true
    environment:
      GATEWAY_ADDR: :8090
      MODELS_DIR: /models
      CATALOG_PATH: /models/catalog.toml
      WORKER_BASE_URLS: ${WORKER_BASE_URLS:-http://worker-0:8092,http://worker-1:8092}
      LLAMA_WORKER_POOL_SIZE: ${LLAMA_WORKER_POOL_SIZE:-2}
      LLAMA_EVICTION_POLICY: ${LLAMA_EVICTION_POLICY:-reject}
      LLAMA_INSTANCE_START_TIMEOUT_SECONDS: ${LLAMA_INSTANCE_START_TIMEOUT_SECONDS:-120}
      LLAMA_WORKER_CTX_SIZE: ${LLAMA_WORKER_CTX_SIZE:-8192}
      LLAMA_WORKER_PARALLEL: ${LLAMA_WORKER_PARALLEL:-1}
      LLAMA_WORKER_THREADS_HTTP: ${LLAMA_WORKER_THREADS_HTTP:--1}
      LLAMA_WORKER_N_GPU_LAYERS: ${LLAMA_WORKER_N_GPU_LAYERS:-999}
      LLAMA_WORKER_EXTRA_ARGS: ${LLAMA_WORKER_EXTRA_ARGS:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_TOKEN: ${HF_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      worker-0:
        condition: service_started
      worker-1:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8090/health >/dev/null
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker-0:
    <<: *worker-common
    container_name: llama-worker-0
    environment:
      <<: *worker-env
      WORKER_ID: worker-0

  worker-1:
    <<: *worker-common
    container_name: llama-worker-1
    environment:
      <<: *worker-env
      WORKER_ID: worker-1
