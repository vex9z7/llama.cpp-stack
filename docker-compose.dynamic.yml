services:
  model-permissions:
    image: alpine:3.22
    restart: "no"
    volumes:
      - ./models:/models:rw,z
    environment:
      APP_UID: ${APP_UID:-10001}
      APP_GID: ${APP_GID:-10001}
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /models/hf
        test -f /models/models-preset.generated.ini || printf 'version = 1\n\n' > /models/models-preset.generated.ini
        chown -R "$${APP_UID}:$${APP_GID}" /models/hf /models/models-preset.generated.ini
        chmod -R u+rwX,g+rwX /models/hf
        chmod u+rw,g+rw /models/models-preset.generated.ini

  gateway-init:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: "no"
    command:
      - render-preset
    volumes:
      - ./models:/models:rw,z
      - ./configs/models.catalog.toml:/configs/models.catalog.toml:ro,z
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "${APP_UID:-10001}:${APP_GID:-10001}"
    environment:
      MODELS_DIR: /models
      CATALOG_PATH: /configs/models.catalog.toml
      LLAMA_MODELS_PRESET: /models/models-preset.generated.ini
      LLAMA_ROUTER_CTX_SIZE: ${LLAMA_ROUTER_CTX_SIZE:-8192}
      LLAMA_ROUTER_PARALLEL: ${LLAMA_ROUTER_PARALLEL:--1}
      LLAMA_ROUTER_THREADS_HTTP: ${LLAMA_ROUTER_THREADS_HTTP:--1}
      LLAMA_ROUTER_N_GPU_LAYERS: ${LLAMA_ROUTER_N_GPU_LAYERS:-999}
      LLAMA_ROUTER_EXTRA_ARGS: ${LLAMA_ROUTER_EXTRA_ARGS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      model-permissions:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_HOST:-${LLAMA_HOST:-127.0.0.1}}:${GATEWAY_PORT:-${LLAMA_PORT:-8090}}:8090"
    volumes:
      - ./models:/models:rw,z
      - ./configs/models.catalog.toml:/configs/models.catalog.toml:ro,z
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "${APP_UID:-10001}:${APP_GID:-10001}"
    environment:
      GATEWAY_ADDR: :8090
      MODELS_DIR: /models
      CATALOG_PATH: /configs/models.catalog.toml
      LLAMA_ROUTER_URL: http://llama-router:8080
      LLAMA_MODELS_PRESET: /models/models-preset.generated.ini
      LLAMA_ROUTER_CTX_SIZE: ${LLAMA_ROUTER_CTX_SIZE:-8192}
      LLAMA_ROUTER_PARALLEL: ${LLAMA_ROUTER_PARALLEL:--1}
      LLAMA_ROUTER_THREADS_HTTP: ${LLAMA_ROUTER_THREADS_HTTP:--1}
      LLAMA_ROUTER_N_GPU_LAYERS: ${LLAMA_ROUTER_N_GPU_LAYERS:-999}
      LLAMA_ROUTER_EXTRA_ARGS: ${LLAMA_ROUTER_EXTRA_ARGS:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_TOKEN_FILE: ${HF_TOKEN_FILE:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      gateway-init:
        condition: service_completed_successfully
      llama-router:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8090/health >/dev/null
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s

  llama-router:
    image: ${LLAMA_ROUTER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-b8840}
    restart: unless-stopped
    volumes:
      - ./models:/models:rw,z
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512m,mode=1777
    expose:
      - "8080"
    environment:
      LLAMA_SERVER_BIN: ${LLAMA_SERVER_BIN:-/app/llama-server}
      LLAMA_MODELS_PRESET: /models/models-preset.generated.ini
      LLAMA_MODELS_MAX: ${LLAMA_MODELS_MAX:-4}
      LLAMA_MODELS_AUTOLOAD: ${LLAMA_MODELS_AUTOLOAD:-1}
      LLAMA_SLEEP_IDLE_SECONDS: ${LLAMA_SLEEP_IDLE_SECONDS:-0}
      LLAMA_ROUTER_ARGS: ${LLAMA_ROUTER_ARGS:-}
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        test -f "$${LLAMA_MODELS_PRESET}" || printf 'version = 1\n\n' > "$${LLAMA_MODELS_PRESET}"
        args=("$${LLAMA_SERVER_BIN}" --host 0.0.0.0 --port 8080 --models-preset "$${LLAMA_MODELS_PRESET}" --models-max "$${LLAMA_MODELS_MAX}")
        if [[ "$${LLAMA_MODELS_AUTOLOAD}" == "0" || "$${LLAMA_MODELS_AUTOLOAD}" == "false" ]]; then
          args+=(--no-models-autoload)
        else
          args+=(--models-autoload)
        fi
        if [[ "$${LLAMA_SLEEP_IDLE_SECONDS}" != "0" && "$${LLAMA_SLEEP_IDLE_SECONDS}" != "" ]]; then
          args+=(--sleep-idle-seconds "$${LLAMA_SLEEP_IDLE_SECONDS}")
        fi
        if [[ -n "$${LLAMA_ROUTER_ARGS}" ]]; then
          # shellcheck disable=SC2206
          extra=( $${LLAMA_ROUTER_ARGS} )
          args+=("$${extra[@]}")
        fi
        exec "$${args[@]}"
    depends_on:
      gateway-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - bash -lc '</dev/tcp/127.0.0.1/8080'
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 20s
    stop_grace_period: 30s
